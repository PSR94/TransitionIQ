openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TransitionIQ Health API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: employer
    description: Employer management
  - name: employee
    description: Employee operations
  - name: recommendations
    description: Coverage recommendations
  - name: assistant
    description: AI Coverage Guide assistant
  - name: consultant
    description: Consultant review flows
  - name: admin
    description: Platform administration
  - name: plans
    description: Health plan data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/session:
    get:
      operationId: getSession
      tags: [auth]
      summary: Get current session
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/demo-login:
    post:
      operationId: demoLogin
      tags: [auth]
      summary: Login as a demo user by role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoLoginBody"
      responses:
        "200":
          description: Demo login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  # Employer
  /employer/dashboard:
    get:
      operationId: getEmployerDashboard
      tags: [employer]
      summary: Get employer dashboard summary
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployerDashboard"

  /employer/cases:
    get:
      operationId: listEmployerCases
      tags: [employer]
      summary: List all transition cases for employer
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of cases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseListResponse"
    post:
      operationId: createCase
      tags: [employer]
      summary: Create a new transition case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseBody"
      responses:
        "201":
          description: Case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransitionCase"

  /employer/cases/{caseId}:
    get:
      operationId: getEmployerCase
      tags: [employer]
      summary: Get a specific transition case
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransitionCase"
    patch:
      operationId: updateCase
      tags: [employer]
      summary: Update transition case
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaseBody"
      responses:
        "200":
          description: Updated case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransitionCase"

  /employer/cases/{caseId}/invite:
    post:
      operationId: sendCaseInvite
      tags: [employer]
      summary: Send invite to employee for this case
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invite sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /employer/analytics:
    get:
      operationId: getEmployerAnalytics
      tags: [employer]
      summary: Get employer aggregate analytics
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployerAnalytics"

  /employer/roi-simulation:
    post:
      operationId: runRoiSimulation
      tags: [employer]
      summary: Run employer ROI simulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoiSimulationInput"
      responses:
        "200":
          description: ROI simulation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoiSimulationResult"

  /employer/stipends:
    get:
      operationId: listStipends
      tags: [employer]
      summary: List stipend policies for employer
      responses:
        "200":
          description: Stipend policies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StipendListResponse"
    post:
      operationId: createStipend
      tags: [employer]
      summary: Create a stipend policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStipendBody"
      responses:
        "201":
          description: Stipend policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StipendPolicy"

  /employer/employees:
    get:
      operationId: listEmployerEmployees
      tags: [employer]
      summary: List employees for employer
      responses:
        "200":
          description: Employee list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeListResponse"

  # Employee
  /employee/dashboard:
    get:
      operationId: getEmployeeDashboard
      tags: [employee]
      summary: Get employee transition dashboard
      responses:
        "200":
          description: Employee dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDashboard"

  /employee/intake:
    get:
      operationId: getIntake
      tags: [employee]
      summary: Get existing intake data
      responses:
        "200":
          description: Intake data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthIntake"
    post:
      operationId: submitIntake
      tags: [employee]
      summary: Submit or update health intake form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitIntakeBody"
      responses:
        "200":
          description: Intake saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthIntake"

  /employee/recommendations:
    get:
      operationId: getEmployeeRecommendations
      tags: [employee]
      summary: Get personalized coverage recommendations
      responses:
        "200":
          description: Recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationResponse"

  /employee/recommendations/generate:
    post:
      operationId: generateRecommendations
      tags: [employee]
      summary: Trigger recommendation generation
      responses:
        "200":
          description: Recommendations generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationResponse"

  /employee/compare:
    get:
      operationId: getCompareOptions
      tags: [employee]
      summary: Get plan comparison data
      parameters:
        - name: planIds
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Plan comparison data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanComparisonResponse"

  /employee/checklist:
    get:
      operationId: getChecklist
      tags: [employee]
      summary: Get employee transition checklist
      responses:
        "200":
          description: Checklist items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistResponse"
    patch:
      operationId: updateChecklistItem
      tags: [employee]
      summary: Update a checklist item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChecklistBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /employee/support-request:
    post:
      operationId: submitSupportRequest
      tags: [employee]
      summary: Submit a consultant support request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportRequestBody"
      responses:
        "201":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /employee/survey:
    post:
      operationId: submitSurvey
      tags: [employee]
      summary: Submit satisfaction survey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveyBody"
      responses:
        "201":
          description: Survey submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /employee/stipend:
    get:
      operationId: getEmployeeStipend
      tags: [employee]
      summary: Get employee's applicable stipend details
      responses:
        "200":
          description: Stipend info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeStipendInfo"

  # AI Assistant
  /assistant/chat:
    post:
      operationId: sendChatMessage
      tags: [assistant]
      summary: Send a message to the Coverage Guide AI assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageBody"
      responses:
        "200":
          description: Assistant response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /assistant/conversations:
    get:
      operationId: listConversations
      tags: [assistant]
      summary: List conversation history
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationsResponse"

  /assistant/conversations/{conversationId}:
    get:
      operationId: getConversation
      tags: [assistant]
      summary: Get a specific conversation with messages
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"

  # Recommendations
  /recommendations/{recommendationId}:
    get:
      operationId: getRecommendation
      tags: [recommendations]
      summary: Get recommendation by ID
      parameters:
        - name: recommendationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Recommendation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationResponse"

  /recommendations/{recommendationId}/review:
    post:
      operationId: reviewRecommendation
      tags: [recommendations]
      summary: Consultant review of recommendation
      parameters:
        - name: recommendationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewBody"
      responses:
        "200":
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # Consultant
  /consultant/dashboard:
    get:
      operationId: getConsultantDashboard
      tags: [consultant]
      summary: Get consultant dashboard
      responses:
        "200":
          description: Consultant dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultantDashboard"

  /consultant/reviews:
    get:
      operationId: listReviews
      tags: [consultant]
      summary: List cases needing consultant review
      responses:
        "200":
          description: Review queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewQueueResponse"

  /consultant/reviews/{caseId}:
    get:
      operationId: getReviewCase
      tags: [consultant]
      summary: Get full case for consultant review
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case review data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsultantCaseReview"

  # Admin
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Get platform admin dashboard
      responses:
        "200":
          description: Admin dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"

  /admin/employers:
    get:
      operationId: listAllEmployers
      tags: [admin]
      summary: List all employers
      responses:
        "200":
          description: Employers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployerListResponse"

  /admin/users:
    get:
      operationId: listAllUsers
      tags: [admin]
      summary: List all users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /admin/audit-logs:
    get:
      operationId: getAuditLogs
      tags: [admin]
      summary: Get audit logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"

  /admin/evaluations:
    get:
      operationId: getEvaluations
      tags: [admin]
      summary: Get AI evaluation results
      responses:
        "200":
          description: Evaluation results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationListResponse"

  /admin/evaluations/run:
    post:
      operationId: runEvaluations
      tags: [admin]
      summary: Run AI evaluation suite
      responses:
        "200":
          description: Evaluation run results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationRunResult"

  /admin/knowledge-base:
    get:
      operationId: listKnowledgeDocs
      tags: [admin]
      summary: List knowledge base documents
      responses:
        "200":
          description: Knowledge documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeDocListResponse"

  /admin/recommendation-settings:
    get:
      operationId: getRecommendationSettings
      tags: [admin]
      summary: Get recommendation engine weights
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationSettings"
    patch:
      operationId: updateRecommendationSettings
      tags: [admin]
      summary: Update recommendation engine weights
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationSettings"

  /admin/plan-data:
    get:
      operationId: listPlanData
      tags: [admin]
      summary: List health plans in the system
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: metalLevel
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Plan data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanDataResponse"

  # Plans
  /plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: Search health plans
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: zipCode
          in: query
          schema:
            type: string
        - name: metalLevel
          in: query
          schema:
            type: string
        - name: planType
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanDataResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    DemoLoginBody:
      type: object
      properties:
        role:
          type: string
          enum: [employer, employee, consultant, admin]
      required: [role]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [token, user]

    SessionResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        authenticated:
          type: boolean
      required: [authenticated]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [employer, employee, consultant, admin]
        employerId:
          type: integer
          nullable: true
        createdAt:
          type: string
      required: [id, email, name, role]

    TransitionCase:
      type: object
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employerId:
          type: integer
        employeeName:
          type: string
        employeeEmail:
          type: string
        departureType:
          type: string
          enum: [layoff, voluntary, retirement, reduction_in_hours, family_coverage_loss, life_event]
        status:
          type: string
          enum: [draft, invited, invite_opened, intake_started, intake_completed, recommendations_generated, consultant_review_needed, recommendations_released, plan_selected, closed]
        coverageEndDate:
          type: string
          nullable: true
        cobraPremiumEstimate:
          type: number
          nullable: true
        employeeZipCode:
          type: string
          nullable: true
        employmentStatus:
          type: string
          nullable: true
        familyCoverage:
          type: boolean
        estimatedSavingsMin:
          type: number
          nullable: true
        estimatedSavingsMax:
          type: number
          nullable: true
        inviteSentAt:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, employeeId, employerId, employeeName, employeeEmail, departureType, status, familyCoverage, createdAt, updatedAt]

    CreateCaseBody:
      type: object
      properties:
        employeeName:
          type: string
        employeeEmail:
          type: string
        departureType:
          type: string
          enum: [layoff, voluntary, retirement, reduction_in_hours, family_coverage_loss, life_event]
        coverageEndDate:
          type: string
          nullable: true
        cobraPremiumEstimate:
          type: number
          nullable: true
        employeeZipCode:
          type: string
          nullable: true
        employmentStatus:
          type: string
          nullable: true
        familyCoverage:
          type: boolean
      required: [employeeName, employeeEmail, departureType, familyCoverage]

    UpdateCaseBody:
      type: object
      properties:
        status:
          type: string
        departureType:
          type: string
        coverageEndDate:
          type: string
          nullable: true
        cobraPremiumEstimate:
          type: number
          nullable: true
        notes:
          type: string
          nullable: true

    CaseListResponse:
      type: object
      properties:
        cases:
          type: array
          items:
            $ref: "#/components/schemas/TransitionCase"
        total:
          type: integer
      required: [cases, total]

    EmployerDashboard:
      type: object
      properties:
        totalCases:
          type: integer
        activeCases:
          type: integer
        pendingIntake:
          type: integer
        pendingReview:
          type: integer
        closedCases:
          type: integer
        estimatedTotalSavings:
          type: number
        cobraExposure:
          type: number
        recentCases:
          type: array
          items:
            $ref: "#/components/schemas/TransitionCase"
        statusBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
      required: [totalCases, activeCases, pendingIntake, pendingReview, closedCases, estimatedTotalSavings, cobraExposure, recentCases, statusBreakdown]

    StatusCount:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required: [status, count]

    EmployerAnalytics:
      type: object
      properties:
        monthlyTrend:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyTrendPoint"
        departureTypeBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        planTypeAdoption:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        averageSavingsPerCase:
          type: number
        averageDaysToComplete:
          type: number
        satisfactionScore:
          type: number
          nullable: true
      required: [monthlyTrend, departureTypeBreakdown, planTypeAdoption, averageSavingsPerCase, averageDaysToComplete]

    MonthlyTrendPoint:
      type: object
      properties:
        month:
          type: string
        cases:
          type: integer
        savings:
          type: number
      required: [month, cases, savings]

    RoiSimulationInput:
      type: object
      properties:
        numDepartingEmployees:
          type: integer
        avgCobraPremium:
          type: number
        cobraElectionRate:
          type: number
        highCostClaimantRate:
          type: number
        avgMonthlyClaimExposure:
          type: number
        stipendAmount:
          type: number
        stipendDurationMonths:
          type: integer
        platformCostPerCase:
          type: number
      required: [numDepartingEmployees, avgCobraPremium, cobraElectionRate, highCostClaimantRate, avgMonthlyClaimExposure, stipendAmount, stipendDurationMonths, platformCostPerCase]

    RoiSimulationResult:
      type: object
      properties:
        scenarios:
          type: array
          items:
            $ref: "#/components/schemas/RoiScenario"
        monthlyTrend:
          type: array
          items:
            $ref: "#/components/schemas/RoiMonthPoint"
        breakEvenMonths:
          type: number
        netAnnualSavings:
          type: number
        totalCobraExposure:
          type: number
      required: [scenarios, monthlyTrend, breakEvenMonths, netAnnualSavings, totalCobraExposure]

    RoiScenario:
      type: object
      properties:
        name:
          type: string
        totalCost:
          type: number
        monthlyCost:
          type: number
        savings:
          type: number
        description:
          type: string
