<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title">
  <title id="title">TransitionIQ Employee Journey</title>
  <rect width="1200" height="520" fill="#fff7ed"/>
  <text x="60" y="70" font-family="Arial" font-size="32" font-weight="700" fill="#111827">Coverage transition journey</text>
  <g font-family="Arial">
    <g fill="#ffffff" stroke-width="2">
      <rect x="70" y="155" width="190" height="170" rx="14" stroke="#ea580c"/>
      <rect x="300" y="155" width="190" height="170" rx="14" stroke="#2563eb"/>
      <rect x="530" y="155" width="190" height="170" rx="14" stroke="#16a34a"/>
      <rect x="760" y="155" width="190" height="170" rx="14" stroke="#9333ea"/>
      <rect x="990" y="155" width="140" height="170" rx="14" stroke="#475569"/>
    </g>
    <g font-size="18" font-weight="700" fill="#111827">
      <text x="105" y="210">Case opened</text>
      <text x="340" y="210">Intake</text>
      <text x="560" y="210">Option estimates</text>
      <text x="795" y="210">Consultant review</text>
      <text x="1022" y="210">Packet</text>
    </g>
    <g font-size="14" fill="#374151">
      <text x="105" y="248">HR creates a synthetic</text><text x="105" y="270">transition case</text>
      <text x="340" y="248">Employee completes</text><text x="340" y="270">coverage profile</text>
      <text x="560" y="248">COBRA and demo plan</text><text x="560" y="270">cost estimates</text>
      <text x="795" y="248">Licensed benefits</text><text x="795" y="270">review required</text>
      <text x="1022" y="248">Employee and</text><text x="1022" y="270">employer summary</text>
    </g>
  </g>
  <g stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M260 240 H300"/><path d="M490 240 H530"/><path d="M720 240 H760"/><path d="M950 240 H990"/>
  </g>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#111827"/></marker></defs>
  <text x="70" y="405" font-family="Arial" font-size="16" fill="#7c2d12">Every step is demo-only and must be verified through official plan sources before real-world action.</text>
</svg>
